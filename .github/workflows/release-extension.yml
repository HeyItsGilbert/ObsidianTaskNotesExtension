# Build self-contained EXE installers and publish a GitHub Release.
# Triggered manually (workflow_dispatch) so the developer controls when a
# release is cut and can supply release notes.
#
# After this workflow succeeds, run update-winget.yml (or wait for the
# "release published" event) to submit the new version to WinGet.

name: Release - Build EXE Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (leave empty to read from csproj)'
        required: false
        type: string
      release_notes:
        description: 'What is new in this version'
        required: false
        default: 'New release with the latest updates and improvements.'
        type: string

env:
  DISPLAY_NAME:    'Obsidian Task Notes'
  EXTENSION_NAME:  'ObsidianTaskNotesExtension'
  FOLDER_NAME:     'ObsidianTaskNotesExtension'
  GITHUB_REPO_URL: 'https://github.com/HeyItsGilbert/ObsidianTaskNotesExtension'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write   # needed to create the GitHub Release
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $projectFile = "${{ env.FOLDER_NAME }}/${{ env.FOLDER_NAME }}/${{ env.EXTENSION_NAME }}.csproj"
            $xml         = [xml](Get-Content $projectFile)
            $version     = $xml.Project.PropertyGroup.AppxPackageVersion | Select-Object -First 1
            if (-not $version) { throw "AppxPackageVersion not found in $projectFile" }
          }
          Write-Host "Using version: $version"
          "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build EXE installers (x64 and ARM64)
        shell: pwsh
        run: |
          Set-Location "${{ env.FOLDER_NAME }}/${{ env.FOLDER_NAME }}"
          .\build-exe.ps1 -Version "${{ steps.version.outputs.VERSION }}" -Platforms @("x64", "arm64")

      - name: Upload x64 installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXTENSION_NAME }}-x64-installer
          path: ${{ env.FOLDER_NAME }}/${{ env.FOLDER_NAME }}/bin/Release/installer/*-x64.exe
          if-no-files-found: error

      - name: Upload ARM64 installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXTENSION_NAME }}-arm64-installer
          path: ${{ env.FOLDER_NAME }}/${{ env.FOLDER_NAME }}/bin/Release/installer/*-arm64.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.EXTENSION_NAME }}-v${{ steps.version.outputs.VERSION }}
          name: "${{ env.DISPLAY_NAME }} v${{ steps.version.outputs.VERSION }}"
          body: |
            ## ${{ env.DISPLAY_NAME }} ${{ steps.version.outputs.VERSION }}

            ## What's New
            ${{ github.event.inputs.release_notes }}

            ## Installation

            Download the installer for your architecture from the Assets section below,
            then run it with standard user privileges (no admin required).

            | Architecture | File |
            |---|---|
            | x64 (Intel/AMD) | `${{ env.EXTENSION_NAME }}-Setup-${{ steps.version.outputs.VERSION }}-x64.exe` |
            | ARM64 (Windows on ARM) | `${{ env.EXTENSION_NAME }}-Setup-${{ steps.version.outputs.VERSION }}-arm64.exe` |

            > **Requirements**: PowerToys with Command Palette enabled.

            ## More Information

            Repository: ${{ env.GITHUB_REPO_URL }}
          files: ${{ env.FOLDER_NAME }}/${{ env.FOLDER_NAME }}/bin/Release/installer/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        shell: pwsh
        run: |
          Write-Host "${{ env.DISPLAY_NAME }} v${{ steps.version.outputs.VERSION }} released!" -ForegroundColor Green
