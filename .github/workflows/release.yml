# Obsidian Task Notes Extension - Build and Release Workflow
#
# This workflow builds a self-signed MSIX bundle and creates a GitHub Release.
# It uses the psake build system via build.ps1.
#
# Required secrets:
#   SIGNING_PFX_BASE64 - Base64-encoded PFX certificate for signing
#   SIGNING_PFX_PASSWORD - Password for the PFX certificate
#
# If secrets are not set, a temporary self-signed certificate is generated.
# For consistent sideloading, store a persistent cert as a secret so users
# only need to trust the certificate once.

name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (leave empty to auto-detect from csproj)"
        required: false
        type: string
      create_release:
        description: "Create GitHub Release"
        required: false
        default: true
        type: boolean

env:
  DISPLAY_NAME: "Obsidian Task Notes"
  EXTENSION_NAME: "ObsidianTaskNotesExtension"
  DOTNET_VERSION: "9.0.x"

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from project
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $projectFile = "${{ env.EXTENSION_NAME }}/${{ env.EXTENSION_NAME }}.csproj"
            $xml = [xml](Get-Content $projectFile)
            $version = $xml.Project.PropertyGroup.AppxPackageVersion | Select-Object -First 1
            if (-not $version) {
              # Try to get version from Package.appxmanifest
              $manifest = [xml](Get-Content "${{ env.EXTENSION_NAME }}/Package.appxmanifest")
              # Convert to semver format
              $version = $manifest.Package.Identity.Version
            }
            if (-not $version) {
              $version = "0.0.1"
              Write-Host "No version found, using default"
            }
          }
          # Ensure we only return semver
          $version = $version -replace '^(\d+)\.(\d+)\.(\d+)\.(\d+)$', '$1.$2.$3'
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $version"
        shell: pwsh

      - name: Validate version consistency
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Write-Host "Validating version consistency for: $version" -ForegroundColor Cyan

          # Extract versions from all sources
          $csprojFile = "${{ env.EXTENSION_NAME }}/${{ env.EXTENSION_NAME }}.csproj"
          $csprojXml = [xml](Get-Content $csprojFile)
          $csprojVersion = $csprojXml.Project.PropertyGroup.AppxPackageVersion | Select-Object -First 1

          $manifestFile = "${{ env.EXTENSION_NAME }}/Package.appxmanifest"
          $manifestXml = [xml](Get-Content $manifestFile)
          $manifestVersion = $manifestXml.Package.Identity.Version

          $changelogContent = Get-Content CHANGELOG.md -Raw
          $changelogHasVersion = $changelogContent -match "\[\s*$([regex]::Escape($version))\s*\]"

          $errors = @()

          # Validate csproj version
          if ($csprojVersion -ne "$version.0") {
            $errors += "csproj version mismatch: expected '$version.0', got '$csprojVersion'"
          } else {
            Write-Host "csproj version matches: $csprojVersion"
          }

          # Validate manifest version
          if ($manifestVersion -ne "$version.0") {
            $errors += "manifest version mismatch: expected '$version.0', got '$manifestVersion'"
          } else {
            Write-Host "manifest version matches: $manifestVersion"
          }

          # Validate changelog entry
          if (-not $changelogHasVersion) {
            $errors += "CHANGELOG.md missing entry for version [$version]"
          } else {
            Write-Host "CHANGELOG.md contains version [$version]"
          }

          if ($errors.Count -gt 0) {
            foreach ($err in $errors) {
              Write-Host "ERROR: $err" -ForegroundColor Red
            }
            throw "Version validation failed"
          }

          Write-Host "All versions are consistent!" -ForegroundColor Green
        shell: pwsh

      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          validation_level: warn
          version: ${{ steps.version.outputs.VERSION }}
          path: ./CHANGELOG.md

      - name: Prepare signing certificate
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"
          if ("${{ secrets.SIGNING_PFX_BASE64 }}" -ne "") {
            Write-Host "Using certificate from repository secrets"
            $pfxBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_PFX_BASE64 }}")
            [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          } else {
            Write-Host "No SIGNING_PFX_BASE64 secret found - a temporary certificate will be generated"
          }
          echo "SIGNING_PFX_PATH=$pfxPath" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Bootstrap and build with psake
        run: |
          Write-Host "Bootstrapping dependencies..." -ForegroundColor Green
          .\build.ps1 -Bootstrap -Task CICD
        shell: pwsh
        env:
          SIGNING_PFX_PATH: ${{ env.SIGNING_PFX_PATH }}
          SIGNING_PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}

      - name: Upload MSIX bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXTENSION_NAME }}-msixbundle
          path: bin/Release/*.msixbundle
          if-no-files-found: warn

      - name: Upload signing certificate artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXTENSION_NAME }}-certificate
          path: bin/Release/*.cer
          if-no-files-found: warn

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "${{ env.DISPLAY_NAME }} v${{ steps.version.outputs.VERSION }}"
          body: |
            ## ${{ env.DISPLAY_NAME }} v${{ steps.version.outputs.VERSION }}

            **Released:** ${{ steps.changelog_reader.outputs.date }}

            ### What's Changed
            ${{ steps.changelog_reader.outputs.changes }}

            ---

            ### Installation (Self-Signed MSIX)

            > **Note:** This release is distributed as a self-signed MSIX package.
            > You must install the signing certificate before installing the extension.
            > The Microsoft Store version is also available but may lag behind.

            #### First-time setup (install the certificate)

            1. Download `ObsidianTaskNotesExtension.cer` from the Assets below
            2. Double-click the `.cer` file and choose **Install Certificate**
            3. Select **Local Machine** > **Place all certificates in the following store**
            4. Browse and select **Trusted People** > OK > Finish

            Or via PowerShell (admin):
            ```powershell
            certutil -addstore TrustedPeople ObsidianTaskNotesExtension.cer
            ```

            #### Install the extension

            1. Ensure [PowerToys](https://github.com/microsoft/PowerToys) is installed with Command Palette enabled
            2. Download the `.msixbundle` from the Assets below
            3. Double-click to install, or run:
               ```powershell
               Add-AppxPackage -Path ObsidianTaskNotesExtension_${{ steps.version.outputs.VERSION }}.0_Bundle.msixbundle
               ```
            4. Open Command Palette and type "Obsidian" to find your commands

            ### Requirements
            - Windows 10 version 19041 or later
            - [PowerToys](https://github.com/microsoft/PowerToys) with Command Palette enabled
            - [TaskNotes](https://tasknotes.dev/) plugin installed in Obsidian
          files: |
            bin/Release/*.msixbundle
            bin/Release/*.cer
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup signing material
        if: always()
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"
          if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force }
        shell: pwsh

      - name: Build summary
        run: |
          Write-Host "Build completed!" -ForegroundColor Green
          Write-Host "Version: ${{ steps.version.outputs.VERSION }}" -ForegroundColor Yellow
          if ("${{ github.event.inputs.create_release }}" -eq "true") {
            Write-Host "GitHub Release created" -ForegroundColor Green
          } else {
            Write-Host "Artifacts uploaded (no release created)" -ForegroundColor Yellow
          }
        shell: pwsh
