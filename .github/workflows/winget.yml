# Updates the WinGet manifest when a new release is published.
# Triggered automatically on release publish or manually via workflow_dispatch.

name: Update WinGet - ObsidianTaskNotesExtension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 0.3.0)"
        required: false
        type: string
      release_tag:
        description: "Release tag (e.g., v0.3.0)"
        required: false
        type: string

env:
  EXTENSION_NAME: ObsidianTaskNotesExtension
  DISPLAY_NAME: "Obsidian Task Notes"
  GITHUB_USER_NAME: HeyItsGilbert
  GITHUB_REPO: ObsidianTaskNotesExtension
  PACKAGE_IDENTITY_NAME: HeyItsGilbert.ObsidianTaskNotesExtension

jobs:
  update-winget:
    # Only run if this is a matching extension release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.name, 'Obsidian Task Notes')
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            # Use provided inputs for manual trigger
            echo "VERSION=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
            echo "TAG=${{ inputs.release_tag }}" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event_name }}" -eq "release") {
            # Extract from release event — tags are formatted as v{VERSION} (e.g., v0.3.0)
            $version = "${{ github.event.release.tag_name }}" -replace "^v", ""
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "TAG=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            # Get latest release matching this extension
            $latestRelease = gh release list --limit 10 --json tagName,name | ConvertFrom-Json | Where-Object { $_.name -like "${{ env.DISPLAY_NAME }}*" } | Select-Object -First 1
            $version = $latestRelease.tagName -replace "^v", ""
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "TAG=$($latestRelease.tagName)" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wingetcreate
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update WinGet manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.release.outputs.VERSION }}"
          $tag = "${{ steps.release.outputs.TAG }}"

          # URLs for both installers
          $x64Url = "https://github.com/${{ env.GITHUB_USER_NAME }}/${{ env.GITHUB_REPO }}/releases/download/$tag/${{ env.EXTENSION_NAME }}-Setup-$version-x64.exe"
          $arm64Url = "https://github.com/${{ env.GITHUB_USER_NAME }}/${{ env.GITHUB_REPO }}/releases/download/$tag/${{ env.EXTENSION_NAME }}-Setup-$version-arm64.exe"

          Write-Host "Updating WinGet manifest for version $version"
          Write-Host "x64 URL: $x64Url"
          Write-Host "ARM64 URL: $arm64Url"

          # Update the manifest with both architecture installers
          .\wingetcreate.exe update ${{ env.PACKAGE_IDENTITY_NAME }} `
            --version $version `
            --urls "$x64Url|x64" "$arm64Url|arm64" `
            --token $env:GITHUB_TOKEN `
            --submit
